<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:420px;
  margin-top:30px;
  text-align:center;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
  box-sizing:border-box;
}

.card {
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:15px;
}

/* DESIGN ROW */
.design-row {
  display:flex;
  align-items:center;
  gap:10px;
  position:relative;
}

.designs {
  display:flex;
  gap:12px;
  overflow-x:auto;
  scroll-behavior:smooth;
  scrollbar-width:none;
}
.designs::-webkit-scrollbar {
  display:none;
}

.designs img {
  width:55px;
  cursor:pointer;
  border-radius:8px;
  border:2px solid transparent;
  transition:0.2s;
}
.designs img:hover { transform:scale(1.05); }
.selected { border:2px solid yellow !important; }

/* fade edges */
.design-row::before,
.design-row::after {
  content:"";
  position:absolute;
  top:0; bottom:0;
  width:25px;
  pointer-events:none;
}
.design-row::before {
  left:0;
  background:linear-gradient(to right,#0f3b4f,transparent);
}
.design-row::after {
  right:0;
  background:linear-gradient(to left,#0f3b4f,transparent);
}

/* CREATE OWN */
.create-box {
  border:2px dashed white;
  width:90px;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
}

/* UPLOAD */
.upload-box {
  border:2px dashed white;
  padding:18px;
  margin-top:12px;
  border-radius:10px;
  cursor:pointer;
}

/* PREVIEW */
.preview {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:10px;
}

.preview-container {
  position:relative;
}

.preview img {
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:6px;
  border:2px solid white;
}

.remove-btn {
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:18px;
  height:18px;
  font-size:12px;
  cursor:pointer;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

.total {
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div id="date"></div>
<div id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>
<div class="total" id="total">Total: ₱0</div>
<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("date").innerText = "Date: " + new Date().toLocaleDateString();
document.getElementById("order").innerText = "Order #: " + orderNum;

let itemCount = 0;
let allItems = [];

function addItem(){
  itemCount++;

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>Item ${itemCount}</h3>

    <select onchange="changeType(this, ${itemCount})">
      <option value="plain">Plain (₱25)</option>
      <option value="design">With Design (₱30)</option>
      <option value="custom">Custom (₱35)</option>
    </select>

    <div id="designSection${itemCount}" style="display:none;">
      <div class="design-row">
        <div class="designs">
          ${[1,2,3,4,5,6,7].map(i =>
            `<img src="design${i}.png" onclick="selectDesign(${itemCount}, ${i})">`
          ).join("")}
        </div>
        <div class="create-box" onclick="selectDesign(${itemCount}, 'customDesign')">
          Create Own
        </div>
      </div>
    </div>

    <div id="customSection${itemCount}" style="display:none;">
      <textarea placeholder="Custom Request..." id="customText${itemCount}"></textarea>

      <div class="upload-box" onclick="triggerInspo(${itemCount})">
        Upload Inspo Photos (optional)
        <input type="file" id="inspo${itemCount}" multiple hidden onchange="handleInspo(${itemCount})">
      </div>

      <div class="preview" id="inspoPreview${itemCount}"></div>
    </div>

    <div class="upload-box" onclick="triggerUpload(${itemCount})">
      Upload Photos (4 only)
      <input type="file" id="file${itemCount}" multiple hidden onchange="handleFiles(${itemCount})">
    </div>

    <div class="preview" id="preview${itemCount}"></div>
  `;

  document.getElementById("items").appendChild(div);

  allItems.push({
    type:"plain",
    design:"none",
    files:[],
    inspo:[]
  });

  updateTotal();
}

function changeType(el,i){
  let val = el.value;
  allItems[i-1].type = val;

  document.getElementById("designSection"+i).style.display =
    val==="design" ? "block" : "none";

  document.getElementById("customSection"+i).style.display =
    val==="custom" ? "block" : "none";

  updateTotal();
}

function selectDesign(item,design){
  allItems[item-1].design = design;

  document.querySelectorAll(`#designSection${item} img`).forEach(img=>{
    img.classList.remove("selected");
  });

  if(typeof design === "number"){
    document.querySelectorAll(`#designSection${item} img`)[design-1].classList.add("selected");
  } else {
    alert("Wait for Canva template after ordering 💌");
  }
}

function triggerUpload(i){
  document.getElementById("file"+i).click();
}

function handleFiles(i){
  let files = Array.from(document.getElementById("file"+i).files).slice(0,4);
  allItems[i-1].files = files;

  let preview = document.getElementById("preview"+i);
  preview.innerHTML = "";

  files.forEach((file,index)=>{
    let reader = new FileReader();
    reader.onload = e=>{
      let div = document.createElement("div");
      div.className="preview-container";
      div.innerHTML=`
        <img src="${e.target.result}">
        <button class="remove-btn" onclick="removeFile(${i},${index})">x</button>
      `;
      preview.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}

function removeFile(i,index){
  allItems[i-1].files.splice(index,1);
  handleFiles(i);
}

function triggerInspo(i){
  document.getElementById("inspo"+i).click();
}

function handleInspo(i){
  let files = Array.from(document.getElementById("inspo"+i).files);
  allItems[i-1].inspo = files;

  let preview = document.getElementById("inspoPreview"+i);
  preview.innerHTML = "";

  files.forEach((file,index)=>{
    let reader = new FileReader();
    reader.onload = e=>{
      let div = document.createElement("div");
      div.className="preview-container";
      div.innerHTML=`
        <img src="${e.target.result}">
        <button class="remove-btn" onclick="removeInspo(${i},${index})">x</button>
      `;
      preview.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}

function removeInspo(i,index){
  allItems[i-1].inspo.splice(index,1);
  handleInspo(i);
}

function updateTotal(){
  let total = 0;
  allItems.forEach(item=>{
    if(item.type==="plain") total+=25;
    if(item.type==="design") total+=30;
    if(item.type==="custom") total+=35;
  });
  document.getElementById("total").innerText="Total: ₱"+total;
}

async function submitOrder(){
  let links=[];

  for(let item of allItems){
    for(let file of item.files){
      let fd=new FormData();
      fd.append("file",file);
      fd.append("upload_preset","keychain_upload");

      let res=await fetch("https://api.cloudinary.com/v1_1/dacsw26s3/image/upload",{method:"POST",body:fd});
      let data=await res.json();
      links.push(data.secure_url);
    }
  }

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number:orderNum,
    name:document.getElementById("name").value,
    email:document.getElementById("email").value,
    total:document.getElementById("total").innerText,
    links:links.join("\n")
  }).then(()=>window.location.href="thankyou.html");
}

addItem();
</script>

</body>
</html>
