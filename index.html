<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
emailjs.init("tp0-EdHc-e3iYbotR");
})();
</script>

<style>
body{
margin:0;
font-family:'Averia Libre', cursive;
background:#0f3550;
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

h1{text-align:center;}

input, textarea{
width:100%;
background:transparent;
border:none;
border-bottom:2px solid white;
color:white;
margin-bottom:15px;
padding:8px;
}

select{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid white;
background:#0f3550;
color:white;
}

button{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:white;
color:#0f3550;
font-weight:bold;
margin-top:10px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.item{
border:1px solid white;
padding:15px;
margin-top:20px;
border-radius:15px;
}

.designRow{
display:flex;
gap:10px;
overflow-x:auto;
margin:10px 0;
}

.design{
width:70px;
cursor:pointer;
opacity:.6;
transition:.3s;
}

.design.active{
opacity:1;
transform:scale(1.1);
}

.createBtn{
min-width:70px;
height:120px;
border:2px dashed white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
opacity:.6;
}

.createBtn.active{
opacity:1;
border:2px solid yellow;
transform:scale(1.1);
}

/* PHOTO STRIP = 1 COLUMN */
.strip{
display:flex;
flex-direction:column;
gap:10px;
margin-top:10px;
}

.slot{
height:90px;
border:2px dashed white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.slot img{
width:100%;
height:100%;
object-fit:cover;
}

.remove{
position:absolute;
top:3px;
right:5px;
cursor:pointer;
}

.highlight{
border-color:yellow;
}

.label{
margin-top:15px;
font-size:13px;
opacity:.8;
}

.inspoGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>

<h3>Customer Details</h3>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
let items=[];
let orderNum=Math.floor(10000+Math.random()*90000);

function addItem(){
items.push({
type:25,
design:null,
custom:"",
photos:[null,null,null,null],
inspo:[]
});
render();
}

function render(){
let html="";
let total=0;

items.forEach((item,i)=>{

total+=item.type;

html+=`
<div class="item">

<h4>Item ${i+1}</h4>

<select onchange="changeType(${i},this.value)">
<option value="25" ${item.type==25?"selected":""}>Plain (₱25)</option>
<option value="30" ${item.type==30?"selected":""}>With Design (₱30)</option>
<option value="35" ${item.type==35?"selected":""}>Custom Request (₱35)</option>
</select>

${item.type==30?`
<div class="designRow">

${[1,2,3,4,5,6,7].map(d=>`
<img src="design${d}.png"
class="design ${item.design==d?"active":""}"
onclick="selectDesign(${i},${d})">
`).join("")}

<div class="createBtn ${item.design=="create"?"active":""}"
onclick="selectDesign(${i},'create')">Create</div>

</div>

${item.design=="create"?`
<div style="font-size:12px;margin-bottom:10px;">
You will receive a Canva template after ordering.
</div>
`:``}

`:``}

${item.type==35?`
<textarea placeholder="Describe your design..."
oninput="items[${i}].custom=this.value"></textarea>

<button onclick="uploadInspo(${i})">+ Add Inspo Photos</button>

<div class="inspoGrid">
${item.inspo.map((p,pi)=>`
<div class="slot">
<img src="${p}">
<div class="remove" onclick="removeInspo(${i},${pi})">✖</div>
</div>
`).join("")}
</div>

`:``}

<div class="label">Photo Strip (4 Photos Required)</div>

<div class="strip">
${item.photos.map((p,pi)=>`
<div class="slot ${!p?'highlight':''}" onclick="upload(${i},${pi})">
${p?`<img src="${p}"><div class="remove" onclick="removePhoto(event,${i},${pi})">✖</div>`:"+ Add Photo"}
</div>
`).join("")}
</div>

<button onclick="multiUpload(${i})" style="margin-top:15px;">
Upload Multiple Photos
</button>

</div>
`;
});

document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText="Total: ₱"+total;
}

function changeType(i,val){
items[i].type=parseInt(val);
items[i].design=null;
items[i].custom="";
items[i].inspo=[];
render();
}

function selectDesign(i,d){
items[i].design=d;
render();
}

function upload(i,pi){
let input=document.createElement("input");
input.type="file";

input.onchange=e=>{
let reader=new FileReader();
reader.onload=()=>{
items[i].photos[pi]=reader.result;
render();
};
reader.readAsDataURL(e.target.files[0]);
};
input.click();
}

function multiUpload(i){
let input=document.createElement("input");
input.type="file";
input.multiple=true;

input.onchange=e=>{
let files=[...e.target.files];
let index=0;

files.forEach(file=>{
let reader=new FileReader();
reader.onload=()=>{
while(index<4 && items[i].photos[index]) index++;
if(index<4){
items[i].photos[index]=reader.result;
render();
}
};
reader.readAsDataURL(file);
});
};
input.click();
}

function uploadInspo(i){
let input=document.createElement("input");
input.type="file";
input.multiple=true;

input.onchange=e=>{
[...e.target.files].forEach(file=>{
let reader=new FileReader();
reader.onload=()=>{
items[i].inspo.push(reader.result);
render();
};
reader.readAsDataURL(file);
});
};
input.click();
}

function removePhoto(e,i,pi){
e.stopPropagation();
items[i].photos[pi]=null;
render();
}

function removeInspo(i,pi){
items[i].inspo.splice(pi,1);
render();
}

function submitOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;

if(!name||!email){
alert("Fill required fields");
return;
}

for(let item of items){
if(item.photos.includes(null)){
alert("Each item needs 4 photos");
return;
}

if(item.type==30 && !item.design){
alert("Select a design");
return;
}

if(item.type==35 && !item.custom){
alert("Describe your custom design");
return;
}
}

let itemsText=items.map((it,i)=>
`Item ${i+1} - ₱${it.type} (${it.design||"N/A"})`
).join("\n");

let attachments=[];

items.forEach(it=>{
attachments.push(...it.photos.filter(p=>p));
attachments.push(...it.inspo);
});

emailjs.send(
"service_wuyfomj",
"template_wlwgyco",
{
order_number:orderNum,
date:new Date().toLocaleDateString(),
name:document.getElementById("name").value,
email:document.getElementById("email").value,
school:document.getElementById("school").value,
grade:document.getElementById("grade").value,
section:document.getElementById("section").value,
items:itemsText,
total:items.reduce((t,i)=>t+i.type,0),
attachments:attachments
}
)
.then(()=>{
alert("Order sent! Order #"+orderNum);
})
.catch(()=>{
alert("Failed to send");
});
}

addItem();
</script>

</body>
</html>
