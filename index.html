<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:420px;
  margin-top:30px;
  text-align:center;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

.card{
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:15px;
}

.design-row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
}
.design-row::-webkit-scrollbar{
  display:none;
}

.designs{
  display:flex;
  gap:10px;
}

.designs img{
  width:55px;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
  transition:0.2s;
}

.designs img:hover{
  transform:scale(1.05);
}

.selected{
  border:2px solid yellow !important;
}

.create-box{
  min-width:80px;
  height:110px;
  border:2px dashed white;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:14px;
  text-align:center;
  padding:5px;
}

.upload-box{
  border:2px dashed white;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
  cursor:pointer;
}

.preview{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.preview img{
  width:60px;
  border-radius:6px;
}

.info-note{
  font-size:13px;
  margin-top:8px;
  opacity:0.9;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div id="date"></div>
<div id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("order").innerText = "Order #: " + orderNum;
document.getElementById("date").innerText =
"Date: " + new Date().toLocaleDateString();

let itemCount = 0;

function addItem(){
  itemCount++;

  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <h3>Item ${itemCount}</h3>

    <select onchange="toggleSections(this)">
      <option value="plain">Plain (₱25)</option>
      <option value="design">With Design (₱30)</option>
      <option value="custom">Custom (₱35)</option>
    </select>

    <!-- WITH DESIGN -->
    <div class="designSection" style="display:none">

      <div class="design-row">
        <div class="designs">
          ${[1,2,3,4,5,6,7].map(n=>`
            <img src="design${n}.png" onclick="selectDesign(this)">
          `).join("")}
        </div>

        <div class="create-box" onclick="selectCreateOwn(this)">
          Create Own
        </div>
      </div>

      <div class="info-note createNote" style="display:none;">
        After ordering, wait for your Canva template link 💌
      </div>

    </div>

    <!-- CUSTOM -->
    <div class="customSection" style="display:none;">
      <textarea placeholder="Custom Request..."></textarea>

      <div class="upload-box" onclick="this.nextElementSibling.click()">
        Upload Inspo Photos (optional)
        <input type="file" multiple hidden onchange="preview(this)">
      </div>

      <div class="preview"></div>
    </div>

    <!-- MAIN PHOTOS -->
    <div class="upload-box" onclick="this.nextElementSibling.click()">
      Upload Photos (4 only)
      <input type="file" multiple hidden onchange="preview(this)">
    </div>

    <div class="preview"></div>
  `;

  document.getElementById("items").appendChild(div);
  updateTotal();
}

function toggleSections(sel){
  let card = sel.closest(".card");

  card.querySelector(".designSection").style.display = "none";
  card.querySelector(".customSection").style.display = "none";

  if(sel.value === "design"){
    card.querySelector(".designSection").style.display = "block";
  }

  if(sel.value === "custom"){
    card.querySelector(".customSection").style.display = "block";
  }

  updateTotal();
}

function selectDesign(img){
  let card = img.closest(".card");

  card.querySelectorAll("img").forEach(i=>i.classList.remove("selected"));
  card.querySelector(".create-box").classList.remove("selected");

  img.classList.add("selected");

  card.querySelector(".createNote").style.display = "none";
}

function selectCreateOwn(box){
  let card = box.closest(".card");

  card.querySelectorAll("img").forEach(i=>i.classList.remove("selected"));
  box.classList.add("selected");

  // show note instead of popup
  card.querySelector(".createNote").style.display = "block";
}

function preview(input){
  let previewBox = input.parentElement.nextElementSibling;
  previewBox.innerHTML = "";

  [...input.files].forEach(file=>{
    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    previewBox.appendChild(img);
  });
}

function updateTotal(){
  let total = 0;

  document.querySelectorAll(".card").forEach(card=>{
    let val = card.querySelector("select").value;

    if(val==="plain") total+=25;
    if(val==="design") total+=30;
    if(val==="custom") total+=35;
  });

  document.getElementById("total").innerText = "Total: ₱"+total;
}

function submitOrder(){

  let items = [];

  document.querySelectorAll(".card").forEach(card=>{
    let type = card.querySelector("select").value;

    let design = "None";

    if(type==="design"){
      let selected = card.querySelector(".selected");
      if(selected && selected.classList.contains("create-box")){
        design = "Create Own";
      } else if(selected){
        design = selected.src.split("/").pop();
      }
    }

    if(type==="custom"){
      design = "Custom Request";
    }

    items.push({type,design});
  });

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number: orderNum,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    school: document.getElementById("school").value,
    grade: document.getElementById("grade").value,
    section: document.getElementById("section").value,
    items: JSON.stringify(items)
  })
  .then(()=>window.location.href="thankyou.html")
  .catch(()=>alert("Failed to send"));
}

addItem();
</script>

</body>
</html>
