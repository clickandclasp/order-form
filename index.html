<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:420px;
  margin-top:30px;
  text-align:center;
}

h1 { margin-bottom:5px; }

.info {
  font-size:14px;
  margin-bottom:10px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
  box-sizing:border-box; /* 🔥 THIS FIXES OVERFLOW */
}

  textarea {
  resize:none;
  max-width:100%;
}

.card {
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:15px;
}

.design-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.designs {
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.designs img {
  width:55px;
  cursor:pointer;
  border:2px solid transparent;
  border-radius:8px;
  transition:0.2s;
}

.designs img:hover {
  transform:scale(1.05);
}

.selected {
  border:2px solid yellow !important;
}

/* CREATE OWN SMALL FIXED BOX */
.create-box {
  border:2px dashed white;
  width:90px;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:13px;
  border-radius:10px;
  cursor:pointer;
  padding:5px;
}

/* UPLOAD BOX */
.upload-box {
  border:2px dashed white;
  padding:20px;
  margin-top:15px;
  border-radius:10px;
  cursor:pointer;
}

/* PHOTO PREVIEW */
.preview {
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.preview img {
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:6px;
  border:2px solid white;
  position:relative;
}

.preview-container {
  position:relative;
}

.remove-btn {
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:18px;
  height:18px;
  font-size:12px;
  cursor:pointer;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

.total {
  margin-top:10px;
  font-size:18px;
}

textarea {
  resize:none;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div class="info" id="date"></div>
<div class="info" id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<div class="total" id="total">Total: ₱0</div>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("date").innerText = "Date: " + new Date().toLocaleDateString();
document.getElementById("order").innerText = "Order #: " + orderNum;

let itemCount = 0;
let allItems = [];

function addItem(){
  itemCount++;

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>Item ${itemCount}</h3>

    <select onchange="changeType(this, ${itemCount})">
      <option value="plain">Plain (₱25)</option>
      <option value="design">With Design (₱30)</option>
      <option value="custom">Custom (₱35)</option>
    </select>

    <div id="designSection${itemCount}" style="display:none;">
      <div class="design-row">
        <div class="designs">
          ${[1,2,3,4,5,6,7].map(i =>
            `<img src="design${i}.png" onclick="selectDesign(${itemCount}, ${i})">`
          ).join("")}
        </div>

        <div class="create-box" onclick="selectDesign(${itemCount}, 'custom')">
          Create Own
        </div>
      </div>
    </div>

    <div id="customSection${itemCount}" style="display:none;">
      <textarea placeholder="Custom Request..." id="customText${itemCount}"></textarea>
    </div>

    <div class="upload-box" onclick="triggerUpload(${itemCount})">
      Upload Photos (4 only)
      <input type="file" id="file${itemCount}" multiple hidden onchange="handleFiles(${itemCount})">
    </div>

    <div class="preview" id="preview${itemCount}"></div>
  `;

  document.getElementById("items").appendChild(div);

  allItems.push({
    type:"plain",
    design:"none",
    files:[]
  });

  updateTotal();
}

function changeType(el, i){
  let val = el.value;
  allItems[i-1].type = val;

  document.getElementById("designSection"+i).style.display =
    val === "design" ? "block" : "none";

  document.getElementById("customSection"+i).style.display =
    val === "custom" ? "block" : "none";

  updateTotal();
}

function selectDesign(item, design){
  allItems[item-1].design = design;

  let imgs = document.querySelectorAll(`#designSection${item} img`);
  imgs.forEach(img => img.classList.remove("selected"));

  if(typeof design === "number"){
    imgs[design-1].classList.add("selected");
  } else {
    alert("Wait for Canva template after order 💌");
  }
}

function triggerUpload(i){
  document.getElementById("file"+i).click();
}

function handleFiles(i){
  let input = document.getElementById("file"+i);
  let preview = document.getElementById("preview"+i);

  let files = Array.from(input.files).slice(0,4);
  allItems[i-1].files = files;

  preview.innerHTML = "";

  files.forEach((file, index)=>{
    let reader = new FileReader();

    reader.onload = function(e){
      let container = document.createElement("div");
      container.className = "preview-container";

      container.innerHTML = `
        <img src="${e.target.result}">
        <button class="remove-btn" onclick="removeImage(${i}, ${index})">x</button>
      `;

      preview.appendChild(container);
    };

    reader.readAsDataURL(file);
  });
}

function removeImage(i, index){
  allItems[i-1].files.splice(index,1);
  handleFiles(i);
}

function updateTotal(){
  let total = 0;

  allItems.forEach(item=>{
    if(item.type === "plain") total += 25;
    if(item.type === "design") total += 30;
    if(item.type === "custom") total += 35;
  });

  document.getElementById("total").innerText = "Total: ₱" + total;
}

async function submitOrder(){
  let allLinks = [];

  for(let item of allItems){
    for(let file of item.files){
      let formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "keychain_upload");

      let res = await fetch("https://api.cloudinary.com/v1_1/dacsw26s3/image/upload",{
        method:"POST",
        body:formData
      });

      let data = await res.json();
      allLinks.push(data.secure_url);
    }
  }

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number: orderNum,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    total: document.getElementById("total").innerText,
    links: allLinks.join("\n")
  })
  .then(()=> window.location.href="thankyou.html")
  .catch(()=> alert("Failed to send"));
}

// start with 1 item
addItem();
</script>

</body>
</html>
