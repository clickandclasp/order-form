<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:420px;
  margin-top:30px;
  text-align:center;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
  box-sizing:border-box;
}

textarea{
  resize:none;
  height:80px;
}

.card{
  width:100%;
  max-width:400px;
  margin:15px auto;
  border-radius:14px;
  padding:18px;
  background:rgba(255,255,255,0.04);
}

/* KEYCHAINS ROW */
.design-row{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:6px;
}

.design-row::-webkit-scrollbar{
  height:6px;
}
.design-row::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.2);
  border-radius:10px;
}

.designs{
  display:flex;
  gap:12px;
  flex-wrap:nowrap;
}

.designs img{
  width:65px;
  flex-shrink:0;
  border-radius:8px;
  cursor:pointer;
  opacity:0.35;
  transition:0.25s;
}

.designs img.selected{
  opacity:1;
  transform:scale(1.05);
}

.create-box{
  min-width:85px;
  height:120px;
  flex-shrink:0;
  border:2px dashed rgba(255,255,255,0.4);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:13px;
  opacity:0.35;
}

.create-box.selected{
  opacity:1;
  border-color:white;
}

/* UPLOAD */
.upload-box{
  border:2px dashed rgba(255,255,255,0.4);
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  cursor:pointer;
}

/* PREVIEW */
.preview{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.preview img{
  width:60px;
  border-radius:6px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div id="date"></div>
<div id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button id="submitBtn" onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("order").innerText = "Order #: " + orderNum;
document.getElementById("date").innerText =
"Date: " + new Date().toLocaleDateString();

let itemCount = 0;

function addItem(){
  itemCount++;

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>Item ${itemCount}</h3>

    <select onchange="toggleSections(this)">
      <option value="plain">Plain (₱25)</option>
      <option value="design">With Design (₱30)</option>
      <option value="custom">Custom (₱35)</option>
    </select>

    <div class="designSection" style="display:none">
      <div class="design-row">
        <div class="designs">
          ${[1,2,3,4,5,6,7].map(n=>`
            <img src="design${n}.png" data-name="design${n}" onclick="selectDesign(this)">
          `).join("")}
        </div>

        <div class="create-box" onclick="selectCreateOwn(this)">
          Create Own
        </div>
      </div>
    </div>

    <div class="customSection" style="display:none;">
      <textarea placeholder="Custom Request..."></textarea>

      <div class="upload-box" onclick="openFile(this)">
        Upload Inspo Photos (optional)
        <input type="file" multiple hidden onchange="handleFiles(this, false)">
      </div>

      <div class="preview"></div>
    </div>

    <div class="upload-box" onclick="openFile(this)">
      Upload Photos (4 for photo strip)
      <input type="file" multiple hidden onchange="handleFiles(this, true)">
    </div>

    <div class="preview"></div>
  `;

  document.getElementById("items").appendChild(div);
  updateTotal();
}

function openFile(box){
  box.querySelector("input").click();
}

function toggleSections(sel){
  let card = sel.closest(".card");

  card.querySelector(".designSection").style.display = "none";
  card.querySelector(".customSection").style.display = "none";

  if(sel.value==="design"){
    card.querySelector(".designSection").style.display="block";
  }

  if(sel.value==="custom"){
    card.querySelector(".customSection").style.display="block";
  }

  updateTotal();
}

function selectDesign(img){
  let card = img.closest(".card");

  card.querySelectorAll(".designs img").forEach(i=>i.classList.remove("selected"));
  card.querySelector(".create-box").classList.remove("selected");

  img.classList.add("selected");
}

function selectCreateOwn(box){
  let card = box.closest(".card");

  card.querySelectorAll(".designs img").forEach(i=>i.classList.remove("selected"));
  box.classList.add("selected");
}

/* HANDLE FILES */
function handleFiles(input, isMain){
  let previewBox = input.parentElement.nextElementSibling;
  let files = [...input.files];

  if(isMain) files = files.slice(0,4);

  previewBox.innerHTML = "";

  files.forEach(file=>{
    let wrapper = document.createElement("div");
    wrapper.file = file;

    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);

    wrapper.appendChild(img);
    previewBox.appendChild(wrapper);
  });
}

/* TOTAL */
function updateTotal(){
  let total = 0;

  document.querySelectorAll(".card").forEach(card=>{
    let val = card.querySelector("select").value;

    if(val==="plain") total+=25;
    if(val==="design") total+=30;
    if(val==="custom") total+=35;
  });

  document.getElementById("total").innerText = "Total: ₱"+total;
}

/* CLOUDINARY */
async function uploadToCloudinary(file){
  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "keychain_upload");

  let res = await fetch("https://api.cloudinary.com/v1_1/dacsw26s3/image/upload",{
    method:"POST",
    body:formData
  });

  let data = await res.json();
  return data.secure_url;
}

/* SUBMIT */
async function submitOrder(){

  let btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Uploading...";

  let items = [];
  let photoGroups = "";
  let inspoGroups = "";

  let designNames = {
    "design1":"Film Strip",
    "design2":"Gwen Stacey",
    "design3":"Miles Morales",
    "design4":"Blue Ocean",
    "design5":"Red Stripes",
    "design6":"Pink Pattern",
    "design7":"Yellow Sun"
  };

  let cards = document.querySelectorAll(".card");

  for(let i=0;i<cards.length;i++){
    let card = cards[i];

    let type = card.querySelector("select").value;
    let design = "None";

    if(type==="design"){
      let selected = card.querySelector(".selected");

      if(selected?.classList.contains("create-box")){
        design = "Create Own";
      } else if(selected){
        design = designNames[selected.dataset.name];
      }
    }

    if(type==="custom"){
      design = card.querySelector("textarea").value || "Custom Request";
    }

    items.push(`Item ${i+1}: ${type.toUpperCase()} - ${design}`);

    /* MAIN PHOTOS */
    let previews = card.querySelectorAll(".preview");
    let main = previews[previews.length-1];

    if(main.children.length){
      photoGroups += `\nItem ${i+1} Photos:\n`;

      for(let p of main.children){
        let url = await uploadToCloudinary(p.file);
        photoGroups += url + "\n";
      }
    }

    /* INSPO */
    let inspo = card.querySelector(".customSection .preview");

    if(inspo && inspo.children.length){
      inspoGroups += `\nItem ${i+1} Inspo Photos:\n`;

      for(let p of inspo.children){
        let url = await uploadToCloudinary(p.file);
        inspoGroups += url + "\n";
      }
    }
  }

  let totalText = document.getElementById("total").innerText;

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number: orderNum,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    school: document.getElementById("school").value,
    grade: document.getElementById("grade").value,
    section: document.getElementById("section").value,
    items: items.join("\n"),
    photos: photoGroups,
    inspo: inspoGroups,
    total: totalText
  })
  .then(()=>{
    window.location.href="thankyou.html";
  })
  .catch(()=>{
    alert("Failed to send");
    btn.disabled = false;
    btn.innerText = "Submit Order";
  });
}

addItem();
</script>

</body>
</html>
