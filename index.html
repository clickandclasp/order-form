<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("tp0-EdHc-e3iYbotR");
})();
</script>

<style>
body{
margin:0;
font-family:'Averia Libre', cursive;
background:#0f3550;
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

h1{text-align:center;}

input, select{
width:100%;
background:transparent;
border:none;
border-bottom:2px solid white;
color:white;
padding:10px;
margin-bottom:15px;
}

select{
border:2px solid white;
border-radius:10px;
padding:12px;
background:#0f3550;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:white;
color:#0f3550;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px rgba(255,255,255,0.5);
}

.item{
border:1px solid white;
padding:15px;
margin-top:20px;
border-radius:15px;
}

.designs{
display:flex;
gap:10px;
overflow-x:auto;
padding-bottom:10px;
}

.design{
width:60px;
height:120px;
opacity:0.5;
cursor:pointer;
transition:0.3s;
}

.design.active{
opacity:1;
transform:scale(1.1);
filter:drop-shadow(0 0 5px white);
}

.createBtn{
width:80px;
height:120px;
display:flex;
align-items:center;
justify-content:center;
border:2px dashed white;
border-radius:10px;
cursor:pointer;
opacity:0.6;
}

.createBtn.active{
opacity:1;
transform:scale(1.1);
box-shadow:0 0 8px white;
}

.photos{
display:flex;
flex-direction:column;
gap:10px;
}

.slot{
border:2px dashed white;
height:80px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.slot img{
width:100%;
height:100%;
object-fit:cover;
}

.remove{
position:absolute;
top:2px;
right:5px;
cursor:pointer;
}

.counter{
font-size:12px;
margin-bottom:10px;
}

.multiBtn{
margin-top:10px;
background:#ffffff22;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>

<p>Date: <span id="date"></span></p>
<p>Order #: <span id="order"></span></p>

<h3>Customer Details</h3>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
let items=[];
let orderNum=Math.floor(10000+Math.random()*90000);
document.getElementById("order").innerText=orderNum;
document.getElementById("date").innerText=new Date().toLocaleDateString();

function addItem(){
items.push({
type:"plain",
design:null,
custom:"",
photos:[null,null,null,null],
inspo:[]
});
render();
}

function render(){
let html="";
let total=0;

items.forEach((item,i)=>{

if(item.type=="plain") total+=25;
if(item.type=="design") total+=30;
if(item.type=="custom") total+=35;

html+=`
<div class="item">

<h4>Item ${i+1}</h4>

<select onchange="changeType(${i},this.value)">
<option value="plain" ${item.type=="plain"?"selected":""}>Plain (₱25)</option>
<option value="design" ${item.type=="design"?"selected":""}>With Design (₱30)</option>
<option value="custom" ${item.type=="custom"?"selected":""}>Custom Request (₱35)</option>
</select>

${item.type=="design"?`
<div class="designs">
${[1,2,3,4,5,6,7].map(d=>`
<img src="design${d}.png"
class="design ${item.design==d?"active":""}"
onclick="selectDesign(${i},${d})">
`).join("")}

<div class="createBtn ${item.design=='create'?'active':''}"
onclick="selectDesign(${i},'create')">
Create Own Design
</div>
</div>

${item.design=='create'?`
<p style="font-size:12px;">
You will receive a Canva template after ordering.  
Please message your order# to our Social Media to request the template.
</p>`:""}
`:``}

${item.type=="custom"?`
<input placeholder="Describe your design..."
oninput="items[${i}].custom=this.value">

<button class="multiBtn" onclick="uploadInspo(${i})">+ Add Inspo Photos</button>
`:``}

<p class="counter">${item.photos.filter(p=>p).length}/4 photos uploaded</p>

<p style="font-size:12px;">Photo Strip (4 Photos)</p>

<div class="photos">
${item.photos.map((p,pi)=>`
<div class="slot" onclick="upload(${i},${pi})">
${p?`<img src="${p}"><div class="remove" onclick="removePhoto(event,${i},${pi})">✖</div>`:"+ Add"}
</div>
`).join("")}
</div>

<button class="multiBtn" onclick="uploadMultiple(${i})">Upload Multiple Photos</button>

</div>
`;

});

document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText="Total: ₱"+total;
}

function changeType(i,val){
items[i].type=val;
items[i].design=null;
items[i].custom="";
render();
}

function selectDesign(i,d){
items[i].design=d;
render();
}

function upload(i,pi){
let input=document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange=e=>{
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=()=>{
items[i].photos[pi]=reader.result;
render();
};
reader.readAsDataURL(file);
};

input.click();
}

function uploadMultiple(i){
let input=document.createElement("input");
input.type="file";
input.multiple=true;

input.onchange=e=>{
let files=e.target.files;
let index=0;

for(let j=0;j<4;j++){
if(!items[i].photos[j] && files[index]){
let reader=new FileReader();
reader.onload=(ev)=>{
items[i].photos[j]=ev.target.result;
render();
};
reader.readAsDataURL(files[index]);
index++;
}
}
};

input.click();
}

function uploadInspo(i){
let input=document.createElement("input");
input.type="file";
input.multiple=true;

input.onchange=e=>{
let files=e.target.files;
for(let f of files){
let reader=new FileReader();
reader.onload=(ev)=>{
items[i].inspo.push(ev.target.result);
};
reader.readAsDataURL(f);
}
};
input.click();
}

function removePhoto(e,i,pi){
e.stopPropagation();
items[i].photos[pi]=null;
render();
}

async function uploadToCloudinary(base64){
let formData=new FormData();
formData.append("file",base64);
formData.append("upload_preset","keychain_upload");

let res=await fetch("https://api.cloudinary.com/v1_1/dacsw26s3/image/upload",{
method:"POST",
body:formData
});

let data=await res.json();
return data.secure_url;
}

async function submitOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let school=document.getElementById("school").value;
let grade=document.getElementById("grade").value;
let section=document.getElementById("section").value;

if(!name||!email){alert("Fill required fields");return;}

let itemsText="";
let total=0;

let uploadedLinks=[];

for(let i=0;i<items.length;i++){

if(items[i].photos.includes(null)){
alert("Each item needs 4 photos");
return;
}

if(items[i].type=="design" && !items[i].design){
alert("Select design");
return;
}

if(items[i].type=="custom" && !items[i].custom){
alert("Describe your design");
return;
}

if(items[i].type=="plain") total+=25;
if(items[i].type=="design") total+=30;
if(items[i].type=="custom") total+=35;

itemsText+=`Item ${i+1} - ${items[i].type}\n`;

for(let p of items[i].photos){
let link=await uploadToCloudinary(p);
uploadedLinks.push(link);
}

for(let p of items[i].inspo){
let link=await uploadToCloudinary(p);
uploadedLinks.push(link);
}
}

emailjs.send("service_wuyfomj","template_wlwgyco",{
order_number:orderNum,
date:new Date().toLocaleDateString(),
name:name,
email:email,
school:school,
grade:grade,
section:section,
items:itemsText,
total:total,
photos:uploadedLinks.join("\n")
})
.then(()=>{
alert("Order sent! Order #"+orderNum);
})
.catch(()=>{
alert("Failed to send");
});

}
</script>

</body>
</html>
