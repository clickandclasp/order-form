<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Form</title>

<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@400;700&family=Inter&family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Inter';background:#0c2d48;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container {width:90%;max-width:500px;border:2px solid white;border-radius:20px;padding:20px;}
h1 {font-family:'Averia Libre';text-align:center;letter-spacing:3px;}
h2,label {font-family:'Patrick Hand';display:block;transform:rotate(-1deg);} 
input,textarea {width:100%;background:transparent;border:none;border-bottom:1px solid white;color:white;margin-bottom:15px;padding:5px;}
button {width:100%;padding:10px;border:none;border-radius:10px;font-family:'Averia Libre';background:white;color:#0c2d48;cursor:pointer;}
.hidden {display:none;}
</style>
</head>

<body>

<div class="container" id="formPage">

<div style="display:flex;justify-content:space-between;font-size:12px;">
<span id="date"></span>
<span id="order"></span>
</div>

<h1>ORDER FORM</h1>

<h2>Customer Details</h2>
<label>Name</label>
<input id="name">

<label>Email</label>
<input id="email">

<label>School</label>
<input id="school">

<label>Grade</label>
<input id="grade">

<label>Section</label>
<input id="section">

<h2>Order Details</h2>

<label><input type="radio" name="type" value="20" checked> Plain (₱25)</label>
<label><input type="radio" name="type" value="35"> Custom Design (₱35)</label>
<label><input type="radio" name="type" value="50"> With Design (₱30)</label>

<div id="customBox" class="hidden">
<label>Custom Request</label>
<textarea id="customText"></textarea>
</div>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<h2 id="total">Total: ₱20</h2>

<button onclick="submitOrder()">Submit Order</button>

</div>

<div class="container hidden" id="thankYouPage" style="text-align:center;">
<h1>Thank You!</h1>
<p>Your order has been received.</p>
<p>Please monitor your email OR send your order number to:</p>
<p><b>Instagram / Facebook: clickandclasp_</b></p>
<p id="finalOrder"></p>
</div>

<script>
document.getElementById("date").textContent = "Date: " + new Date().toLocaleDateString();
const orderNum = Math.floor(10000 + Math.random()*90000);
document.getElementById("order").textContent = "Order #: " + orderNum;

const radios = document.querySelectorAll('input[name="type"]');
const qty = document.getElementById("qty");
const totalText = document.getElementById("total");
const customBox = document.getElementById("customBox");

function updateTotal(){
const selected = document.querySelector('input[name="type"]:checked');
const price = selected.value;

totalText.textContent = "Total: ₱" + (price * qty.value);

if(price == 35){customBox.classList.remove("hidden");}
else{customBox.classList.add("hidden");}
}

radios.forEach(r=>r.addEventListener("change",updateTotal));
qty.addEventListener("input",updateTotal);

function submitOrder(){
const name = document.getElementById("name").value;
const email = document.getElementById("email").value;

if(!name || !email){alert("Please fill required fields");return;}

// switch page

document.getElementById("formPage").classList.add("hidden");
document.getElementById("thankYouPage").classList.remove("hidden");

document.getElementById("finalOrder").textContent = "Order #: " + orderNum;
}
</script>

</body>
</html>
