<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
emailjs.init("tp0-EdHc-e3iYbotR");
})();
</script>

<style>
body{
margin:0;
font-family:'Averia Libre', cursive;
background:#0f3550;
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

input, select, textarea{
width:100%;
background:transparent;
border:none;
border-bottom:2px solid white;
color:white;
padding:8px;
margin-bottom:15px;
}

select{
border:2px solid white;
border-radius:8px;
padding:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:white;
color:#0f3550;
font-weight:bold;
cursor:pointer;
transition:0.25s;
margin-top:15px;
}

button:hover{
transform:scale(1.05);
}

.item{
border:1px solid white;
padding:12px;
margin-top:20px;
border-radius:12px;
}

.designs{
display:flex;
overflow-x:auto;
gap:12px;
padding:10px 0;
scrollbar-width:none;
}

.designs::-webkit-scrollbar{
display:none;
}

.design{
width:70px;
height:130px;
object-fit:contain;
flex-shrink:0;
cursor:pointer;
opacity:0.7;
transition:0.25s;
}

.design.active{
opacity:1;
transform:scale(1.1);
}

.custom-design{
width:70px;
height:130px;
flex-shrink:0;
border:2px dashed white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
cursor:pointer;
}

.photos{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.slot{
border:2px dashed white;
height:100px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
}

.slot img{
width:100%;
height:100%;
object-fit:cover;
}

.remove{
position:absolute;
top:3px;
right:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>ORDER FORM</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>

let items=[];
let orderNum=Math.floor(10000+Math.random()*90000);

function addItem(){
items.push({
type:25,
design:null,
photos:[null,null,null,null],
inspo:[],
custom:""
});
render();
}

function render(){

let html="";
let total=0;

items.forEach((item,i)=>{

total+=item.type;

html+=`
<div class="item">
<h4>Item ${i+1}</h4>

<select onchange="changeType(${i},this.value)">
<option value="25">Plain (₱25)</option>
<option value="30">With Design (₱30)</option>
<option value="35">Custom (₱35)</option>
</select>

${item.type==30?`
<div class="designs">

${[1,2,3,4,5,6,7].map(d=>`
<img src="design${d}.png"
class="design ${item.design==d?"active":""}"
onclick="selectDesign(${i},${d})">
`).join("")}

<div class="custom-design ${item.design==='create'?'active':''}"
onclick="selectDesign(${i},'create')">
Create
</div>

</div>
`:``}

${item.type==35?`
<textarea placeholder="Describe your design..."
oninput="items[${i}].custom=this.value"></textarea>

<button onclick="uploadInspo(${i})">+ Add Inspo Photos</button>
`:``}

<div class="photos">
${item.photos.map((p,pi)=>`
<div class="slot" onclick="upload(${i},${pi})">
${p?`<img src="${p}">
<div class="remove" onclick="removePhoto(event,${i},${pi})">✖</div>`
:"+ Add"}
</div>
`).join("")}
</div>

<button onclick="multiUpload(${i})">Upload Multiple Photos</button>

</div>
`;
});

document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText="Total: ₱"+total;
}

function changeType(i,val){
items[i].type=parseInt(val);
items[i].design=null;
render();
}

function selectDesign(i,d){
items[i].design=d;
render();
}

function upload(i,pi){
let input=document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange=e=>{
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=()=>{
items[i].photos[pi]=reader.result;
render();
};
reader.readAsDataURL(file);
};

input.click();
}

function multiUpload(i){
let input=document.createElement("input");
input.type="file";
input.multiple=true;
input.accept="image/*";

input.onchange=e=>{
let files=[...e.target.files];

let empty = items[i].photos
.map((p,index)=>p?null:index)
.filter(x=>x!==null);

files.slice(0,empty.length).forEach((file,idx)=>{
let reader=new FileReader();
reader.onload=()=>{
items[i].photos[empty[idx]]=reader.result;
render();
};
reader.readAsDataURL(file);
});
};

input.click();
}

function uploadInspo(i){
let input=document.createElement("input");
input.type="file";
input.multiple=true;
input.accept="image/*";

input.onchange=e=>{
[...e.target.files].forEach(file=>{
let reader=new FileReader();
reader.onload=()=>{
items[i].inspo.push(reader.result);
render();
};
reader.readAsDataURL(file);
});
};

input.click();
}

function removePhoto(e,i,pi){
e.stopPropagation();
items[i].photos[pi]=null;
render();
}

function submitOrder(){

let itemsHTML="";
let total=0;

for(let i=0;i<items.length;i++){

if(items[i].photos.includes(null)){
alert("Each item needs 4 photos");
return;
}

if(items[i].type==30 && !items[i].design){
alert("Select a design");
return;
}

total+=items[i].type;

itemsHTML+=`<h3>Item ${i+1}</h3>`;

items[i].photos.forEach(p=>{
itemsHTML+=`<img src="${p}" width="100"><br>`;
});

if(items[i].inspo.length){
itemsHTML+="<b>Inspo:</b><br>";
items[i].inspo.forEach(p=>{
itemsHTML+=`<img src="${p}" width="100"><br>`;
});
}

if(items[i].custom){
itemsHTML+=`Request: ${items[i].custom}<br>`;
}
}

emailjs.send(
"service_wuyfomj",
"template_wlwgyco",
{
order_number:orderNum,
date:new Date().toLocaleDateString(),
name:document.getElementById("name").value,
email:document.getElementById("email").value,
school:document.getElementById("school").value,
grade:document.getElementById("grade").value,
section:document.getElementById("section").value,
items:itemsHTML,
total:total
}
)
.then(()=>{
alert("Order sent! Order #" + orderNum);
})
.catch(()=>{
alert("Failed to send");
});

}

</script>

</body>
</html>
