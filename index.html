<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:420px;
  margin-top:30px;
  text-align:center;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

.card {
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:15px;
}

/* DESIGNS */
.design-row {
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
}
.design-row::-webkit-scrollbar { display:none; }

.design-row img {
  width:60px;
  border-radius:8px;
  cursor:pointer;
  border:2px solid transparent;
  transition:0.2s;
}
.design-row img:hover { transform:scale(1.05); }

.selected {
  border:2px solid yellow !important;
}

/* CREATE OWN */
.create-btn {
  border:2px dashed white;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
  white-space:nowrap;
}
.create-btn.active {
  border-color:yellow;
  color:yellow;
}

/* UPLOAD */
.upload-box {
  border:2px dashed white;
  padding:25px;
  margin-top:12px;
  border-radius:10px;
  cursor:pointer;
}

textarea {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div id="date"></div>
<div id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>
<h3 id="total">Total: ₱0</h3>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("order").innerText = "Order #: " + orderNum;
document.getElementById("date").innerText = "Date: " + new Date().toLocaleDateString();

let itemCount = 0;
let total = 0;

const designNames = {
  1:"Film Strip",
  2:"Gwen Stacey",
  3:"Miles Morales",
  4:"Blue Ocean",
  5:"Red Stripes",
  6:"Pink Pattern",
  7:"Yellow Sun",
  "canva":"Create Own (Canva)"
};

function addItem(){
  itemCount++;

  let div = document.createElement("div");
  div.className="card";

  div.innerHTML = `
    <h3>Item ${itemCount}</h3>

    <select onchange="toggleSections(this, ${itemCount})">
      <option value="plain">Plain (₱25)</option>
      <option value="design">With Design (₱30)</option>
      <option value="custom">Custom (₱35)</option>
    </select>

    <!-- DESIGN -->
    <div id="designBox${itemCount}" style="display:none">

      <div class="design-row">
        ${[1,2,3,4,5,6,7].map(i=>`
          <img src="design${i}.png" onclick="selectDesign(${itemCount}, ${i}, this)">
        `).join("")}

        <div class="create-btn" onclick="selectCanva(${itemCount}, this)">
          Create Own
        </div>
      </div>

      <div id="canvaMsg${itemCount}" style="display:none; margin-top:10px; font-size:13px;">
        Wait for Canva template to be sent after ordering.
      </div>

    </div>

    <!-- CUSTOM -->
    <div id="customBox${itemCount}" style="display:none">
      <textarea id="customText${itemCount}" placeholder="Custom Request..."></textarea>

      <div class="upload-box" onclick="document.getElementById('inspo${itemCount}').click()">
        Upload Inspo Photos (optional)
        <input type="file" id="inspo${itemCount}" multiple hidden>
      </div>
    </div>

    <!-- PHOTOS -->
    <div class="upload-box" onclick="document.getElementById('file${itemCount}').click()">
      Upload Photos (4 only)
      <input type="file" id="file${itemCount}" multiple hidden>
    </div>
  `;

  document.getElementById("items").appendChild(div);
  updateTotal();
}

function toggleSections(select, id){
  document.getElementById("designBox"+id).style.display="none";
  document.getElementById("customBox"+id).style.display="none";

  if(select.value==="design"){
    document.getElementById("designBox"+id).style.display="block";
  }

  if(select.value==="custom"){
    document.getElementById("customBox"+id).style.display="block";
  }

  updateTotal();
}

function selectDesign(item, num, el){
  document.querySelectorAll(`#designBox${item} img`).forEach(img=>img.classList.remove("selected"));
  document.querySelector(`#designBox${item} .create-btn`).classList.remove("active");

  el.classList.add("selected");
  document.getElementById("canvaMsg"+item).style.display="none";

  el.dataset.value = num;
}

function selectCanva(item, el){
  document.querySelectorAll(`#designBox${item} img`).forEach(img=>img.classList.remove("selected"));
  el.classList.add("active");

  document.getElementById("canvaMsg"+item).style.display="block";

  el.dataset.value = "canva";
}

function updateTotal(){
  total = 0;

  document.querySelectorAll("#items select").forEach(sel=>{
    if(sel.value==="plain") total+=25;
    if(sel.value==="design") total+=30;
    if(sel.value==="custom") total+=35;
  });

  document.getElementById("total").innerText = "Total: ₱"+total;
}

async function submitOrder(){

  let allData = "";

  for(let i=1;i<=itemCount;i++){

    let files = document.getElementById("file"+i).files;

    if(files.length !== 4){
      alert(`Item ${i}: Upload exactly 4 photos`);
      return;
    }

    let uploaded=[];

    for(let f of files){
      let fd = new FormData();
      fd.append("file", f);
      fd.append("upload_preset","keychain_upload");

      let res = await fetch("https://api.cloudinary.com/v1_1/dacsw26s3/image/upload",{
        method:"POST",
        body:fd
      });

      let data = await res.json();
      uploaded.push(data.secure_url);
    }

    let type = document.querySelectorAll("#items select")[i-1].value;
    let design = "None";

    let selectedImg = document.querySelector(`#designBox${i} img.selected`);
    let canva = document.querySelector(`#designBox${i} .create-btn.active`);

    if(selectedImg){
      let index = Array.from(selectedImg.parentNode.children).indexOf(selectedImg)+1;
      design = designNames[index];
    }

    if(canva){
      design = "Create Own (Canva)";
    }

    let customText = document.getElementById("customText"+i)?.value || "";

    allData += `
Item ${i}
Type: ${type}
Design: ${design}
Custom: ${customText}
Photos:
${uploaded.join("\n")}
---------------------
`;
  }

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number: orderNum,
    name: name.value,
    email: email.value,
    school: school.value,
    grade: grade.value,
    section: section.value,
    message: allData,
    total: total
  })
  .then(()=>window.location.href="thankyou.html")
  .catch(()=>alert("Failed to send"));
}

addItem();
</script>

</body>
</html>
