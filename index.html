<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
emailjs.init("tp0-EdHc-e3iYbotR");
})();
</script>

<style>
body{
margin:0;
font-family:'Averia Libre', cursive;
background:#0f3550;
color:white;
}
.container{max-width:420px;margin:auto;padding:20px;}
.topbar{display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px;}

input, textarea{
width:100%;
background:transparent;
border:none;
border-bottom:2px solid white;
color:white;
margin-bottom:15px;
padding:8px;
}

select{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid white;
background:#0f3550;
color:white;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:white;
color:#0f3550;
font-weight:bold;
cursor:pointer;
transition:.25s;
}
button:hover{transform:scale(1.04);}

.item{
border:1px solid white;
padding:15px;
margin-top:20px;
border-radius:15px;
}

.designRow{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:10px;
}
.designRow::-webkit-scrollbar{display:none;}

.design{
width:65px;
opacity:.5;
cursor:pointer;
transition:.2s;
}
.design.active{
opacity:1;
transform:scale(1.1);
}

.createBtn{
min-width:65px;
height:110px;
border:2px dashed white;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
text-align:center;
cursor:pointer;
opacity:.5;
}
.createBtn.active{
opacity:1;
border:2px solid yellow;
}

.label{margin-top:15px;margin-bottom:8px;font-size:13px;}

.strip{
display:flex;
flex-direction:column;
gap:10px;
}

.slot{
height:85px;
border:2px dashed white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:12px;
position:relative;
}

.slot img{
width:100%;
height:100%;
object-fit:cover;
}

.remove{
position:absolute;
top:4px;
right:6px;
font-size:12px;
cursor:pointer;
}

.multiUpload{
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>ORDER FORM</h2>

<div class="topbar">
<div>Date: <span id="date"></span></div>
<div>Order #: <span id="orderNum"></span></div>
</div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
let items=[];
let orderNum=Math.floor(10000+Math.random()*90000);

document.getElementById("date").innerText=new Date().toLocaleDateString();
document.getElementById("orderNum").innerText=orderNum;

function addItem(){
items.push({
type:25,
design:null,
photos:[null,null,null,null]
});
render();
}

function render(){
let html="";
let total=0;

items.forEach((item,i)=>{
total+=item.type;

html+=`
<div class="item">

<select onchange="changeType(${i},this.value)">
<option value="25" ${item.type==25?"selected":""}>Plain (₱25)</option>
<option value="30" ${item.type==30?"selected":""}>With Design (₱30)</option>
</select>

<div class="designRow">

${[1,2,3,4,5,6,7].map(d=>`
<img src="design${d}.png"
class="design ${item.design==d?"active":""}"
onclick="selectDesign(${i},${d})">
`).join("")}

<div class="createBtn ${item.design=="create"?"active":""}"
onclick="selectDesign(${i},'create')">
Create Own Design
</div>

</div>

${item.design=="create"?`
<div style="font-size:12px;margin-top:10px;">
You will receive a Canva template after ordering.  
Please message your order# to our Social Media to request the template.
</div>
`:``}

<div class="label">Photo Strip (4 Photos)</div>

<div class="strip">
${item.photos.map((p,pi)=>`
<div class="slot" onclick="upload(${i},${pi})">
${p?`<img src="${URL.createObjectURL(p)}"><div class="remove" onclick="removePhoto(event,${i},${pi})">✖</div>`:"+ Add"}
</div>
`).join("")}
</div>

<div class="multiUpload">
<button onclick="multiUpload(${i})">Upload Multiple Photos</button>
</div>

</div>
`;
});

document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText="Total: ₱"+total;
}

function changeType(i,val){
items[i].type=parseInt(val);
items[i].design=null;
render();
}

function selectDesign(i,d){
items[i].design=d;
render();
}

function upload(i,pi){
let input=document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange=e=>{
items[i].photos[pi]=e.target.files[0];
render();
};

input.click();
}

function multiUpload(i){
let input=document.createElement("input");
input.type="file";
input.multiple=true;

input.onchange=e=>{
let files=[...e.target.files];
for(let j=0;j<4;j++){
if(!items[i].photos[j] && files.length){
items[i].photos[j]=files.shift();
}
}
render();
};
input.click();
}

function removePhoto(e,i,pi){
e.stopPropagation();
items[i].photos[pi]=null;
render();
}

async function uploadToCloudinary(file){
const url="https://api.cloudinary.com/v1_1/dacsw26s3/image/upload";

const formData=new FormData();
formData.append("file",file);
formData.append("upload_preset","keychain_upload");

const res=await fetch(url,{method:"POST",body:formData});
const data=await res.json();
return data.secure_url;
}

async function submitOrder(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let school=document.getElementById("school").value;
let grade=document.getElementById("grade").value;
let section=document.getElementById("section").value;

if(!name||!email){
alert("Fill required fields");
return;
}

alert("Uploading photos... please wait ⏳");

let itemsText="";
let total=0;

for(let i=0;i<items.length;i++){

if(items[i].photos.includes(null)){
alert("Each item needs 4 photos");
return;
}

total+=items[i].type;

itemsText+=`Item ${i+1} - ₱${items[i].type}\n`;

for(let p of items[i].photos){
let url=await uploadToCloudinary(p);
itemsText+=url+"\n";
}

itemsText+="\n";
}

let data={
order_number:orderNum,
date:new Date().toLocaleDateString(),
name:name,
email:email,
school:school,
grade:grade,
section:section,
items:itemsText,
total:total
};

emailjs.send("service_wuyfomj","template_wlwgyco",data)
.then(()=>{
return emailjs.send("service_wuyfomj","template_wlm8hv4",data);
})
.then(()=>{
alert("Order sent successfully 💖");
})
.catch(err=>{
alert("Error: "+JSON.stringify(err));
});
}

addItem();
</script>

</body>
</html>
