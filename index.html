<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:420px;
  margin-top:30px;
  text-align:center;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
  box-sizing:border-box; /* 🔥 THIS FIXES OVERFLOW */
}

  textarea {
  resize:none;
  max-width:100%;
}
  
.card{
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:15px;
}

.designs{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
}
.designs::-webkit-scrollbar{display:none;}

.designs img{
  width:55px;
  cursor:pointer;
  border-radius:8px;
  border:2px solid transparent;
  transition:.2s;
}
.designs img:hover{transform:scale(1.05);}
.selected{border:2px solid yellow;}

.create-box{
  min-width:70px;
  height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px dashed white;
  border-radius:12px;
  cursor:pointer;
  font-size:12px;
}

.upload-box{
  border:2px dashed white;
  padding:20px;
  margin-top:10px;
  border-radius:10px;
  cursor:pointer;
}

.preview{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.preview div{
  position:relative;
}

.preview img{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}

.remove{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:18px;
  height:18px;
  cursor:pointer;
  font-size:12px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

.info-text{
  font-size:13px;
  opacity:.8;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div id="date"></div>
<div id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let items=[];
let orderNum=Math.floor(Math.random()*90000)+10000;

document.getElementById("date").innerText="Date: "+new Date().toLocaleDateString();
document.getElementById("order").innerText="Order #: "+orderNum;

function addItem(){
  let id=Date.now();
  items.push({
    id,
    type:"plain",
    design:null,
    createOwn:false,
    customText:"",
    images:[],
    inspo:[]
  });
  render();
}

function render(){
  let html="";
  items.forEach((item,i)=>{
    html+=`
    <div class="card">
    <h3>Item ${i+1}</h3>

    <select onchange="changeType(${item.id},this.value)">
      <option value="plain" ${item.type=="plain"?"selected":""}>Plain (₱25)</option>
      <option value="design" ${item.type=="design"?"selected":""}>With Design (₱30)</option>
      <option value="custom" ${item.type=="custom"?"selected":""}>Custom (₱35)</option>
    </select>

    ${item.type==="design"?`
      <div class="designs">
        ${[1,2,3,4,5].map(n=>`
          <img src="design${n}.png"
          class="${item.design===n?"selected":""}"
          onclick="selectDesign(${item.id},${n})">
        `).join("")}

        <div class="create-box ${item.createOwn?"selected":""}"
        onclick="toggleCreateOwn(${item.id})">
        Create Own
        </div>
      </div>

      ${item.createOwn?`
      <div class="info-text">
      Wait for Canva template after ordering 📩
      </div>
      `:""}

      <div class="upload-box" onclick="triggerUpload(${item.id})">
      Upload Photos (4 only)
      </div>

      <div class="preview">
        ${item.images.map((img,idx)=>`
          <div>
            <img src="${img}">
            <button class="remove" onclick="removeImg(${item.id},${idx})">×</button>
          </div>
        `).join("")}
      </div>
    `:""}

    ${item.type==="custom"?`
      <textarea placeholder="Custom Request..."
      onchange="setCustomText(${item.id},this.value)">${item.customText}</textarea>

      <div class="upload-box" onclick="triggerInspo(${item.id})">
      Upload Inspo Photos (optional)
      </div>

      <div class="preview">
        ${item.inspo.map((img,idx)=>`
          <div>
            <img src="${img}">
            <button class="remove" onclick="removeInspo(${item.id},${idx})">×</button>
          </div>
        `).join("")}
      </div>
    `:""}

    </div>
    `;
  });

  document.getElementById("items").innerHTML=html;
  updateTotal();
}

function changeType(id,val){
  let item=items.find(i=>i.id===id);
  item.type=val;
  render();
}

function selectDesign(id,n){
  let item=items.find(i=>i.id===id);
  item.design=n;
  item.createOwn=false;
  render();
}

function toggleCreateOwn(id){
  let item=items.find(i=>i.id===id);
  item.createOwn=!item.createOwn;
  item.design=null;
  render();
}

function setCustomText(id,value){
  let item=items.find(i=>i.id===id);
  item.customText=value;
}

/* MAIN IMAGE UPLOAD */
function triggerUpload(id){
  let input=document.createElement("input");
  input.type="file";
  input.multiple=true;

  input.onchange=e=>{
    let files=[...e.target.files].slice(0,4);

    let item=items.find(i=>i.id===id);
    item.images=[];

    files.forEach(file=>{
      let reader=new FileReader();
      reader.onload=ev=>{
        item.images.push(ev.target.result);
        render();
      };
      reader.readAsDataURL(file);
    });
  };

  input.click();
}

/* INSPO UPLOAD */
function triggerInspo(id){
  let input=document.createElement("input");
  input.type="file";
  input.multiple=true;

  input.onchange=e=>{
    let files=[...e.target.files];

    let item=items.find(i=>i.id===id);
    item.inspo=[];

    files.forEach(file=>{
      let reader=new FileReader();
      reader.onload=ev=>{
        item.inspo.push(ev.target.result);
        render();
      };
      reader.readAsDataURL(file);
    });
  };

  input.click();
}

function removeImg(id,index){
  let item=items.find(i=>i.id===id);
  item.images.splice(index,1);
  render();
}

function removeInspo(id,index){
  let item=items.find(i=>i.id===id);
  item.inspo.splice(index,1);
  render();
}

function updateTotal(){
  let total=0;
  items.forEach(i=>{
    if(i.type==="plain") total+=25;
    if(i.type==="design") total+=30;
    if(i.type==="custom") total+=35;
  });
  document.getElementById("total").innerText="Total: ₱"+total;
}

/* CLEAN EMAIL FORMAT */
function submitOrder(){

  let summary="";
  let total=0;

  items.forEach((item,i)=>{
    let line=`Item ${i+1}: `;

    if(item.type==="plain"){
      line+="Plain (₱25)";
      total+=25;
    }

    if(item.type==="design"){
      total+=30;

      if(item.createOwn){
        line+="Create Own Design (₱30)";
      } else {
        line+="Design "+(item.design || "Not selected")+" (₱30)";
      }
    }

    if(item.type==="custom"){
      total+=35;
      line+="Custom (₱35)\nRequest: "+(item.customText || "None");
    }

    summary+=line+"\n\n";
  });

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number:orderNum,
    name:name.value,
    email:email.value,
    school:school.value,
    grade:grade.value,
    section:section.value,
    items:summary,
    total:"₱"+total
  })
  .then(()=>{window.location.href="thankyou.html";})
  .catch(()=>{alert("Failed to send");});
}

addItem();
</script>

</body>
</html>
