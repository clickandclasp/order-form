<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:420px;
  margin-top:30px;
  text-align:center;
}

h1 {
  margin-bottom:5px;
}

.info {
  font-size:14px;
  margin-bottom:15px;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

.card {
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:15px;
}

.design-row {
  display:flex;
  align-items:center;
  gap:15px;
  margin-top:10px;
}

.designs {
  display:flex;
  gap:10px;
  overflow-x:auto;
  max-width:230px;
}

.designs img {
  width:50px;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
}

.designs img.selected {
  border:2px solid yellow;
}

.create-btn {
  border:2px dashed white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  min-width:130px;
  text-align:center;
}

.upload-box {
  border:2px dashed white;
  padding:30px;
  margin-top:15px;
  border-radius:10px;
  cursor:pointer;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>

<div class="info" id="date"></div>
<div class="info" id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div class="card">

<select id="type">
  <option value="plain">Plain (₱25)</option>
  <option value="design">With Design (₱30)</option>
</select>

<!-- DESIGN SECTION -->
<div id="designSection" style="display:none;">

  <div class="design-row">

    <div class="designs">
      <img src="design1.png" onclick="selectDesign(1)">
      <img src="design2.png" onclick="selectDesign(2)">
      <img src="design3.png" onclick="selectDesign(3)">
      <img src="design4.png" onclick="selectDesign(4)">
      <img src="design5.png" onclick="selectDesign(5)">
      <img src="design6.png" onclick="selectDesign(6)">
      <img src="design7.png" onclick="selectDesign(7)">
    </div>

    <div class="create-btn" onclick="selectDesign('custom')">
      Create Own Design
    </div>

  </div>

</div>

<div class="upload-box" onclick="fileInput.click()">
  Click to Upload Photos
  <input type="file" id="fileInput" multiple hidden>
</div>

<button onclick="submitOrder()">Submit Order</button>

</div>
</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let selectedDesign = "none";

// SELECT DESIGN
function selectDesign(d){
  selectedDesign = d;

  document.querySelectorAll(".designs img").forEach(img=>{
    img.classList.remove("selected");
  });

  if(typeof d === "number"){
    document.querySelectorAll(".designs img")[d-1].classList.add("selected");
  }
}

// SHOW DESIGN ONLY IF NEEDED
document.getElementById("type").addEventListener("change",()=>{
  let val = document.getElementById("type").value;
  document.getElementById("designSection").style.display =
    val === "design" ? "block" : "none";
});

// DATE + ORDER #
let today = new Date();
document.getElementById("date").innerText = "Date: " + today.toLocaleDateString();
let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("order").innerText = "Order #: " + orderNum;

// SUBMIT
async function submitOrder(){

  let files = document.getElementById("fileInput").files;
  let uploaded = [];

  for(let file of files){
    let formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "keychain_upload");

    let res = await fetch("https://api.cloudinary.com/v1_1/dacsw26s3/image/upload",{
      method:"POST",
      body:formData
    });

    let data = await res.json();
    uploaded.push(data.secure_url);
  }

  let designNames = {
    1:"Film Strip",
    2:"Gwen Stacey",
    3:"Miles Morales",
    4:"Blue Ocean",
    5:"Red Stripes",
    6:"Pink Pattern",
    7:"Yellow Sun",
    "custom":"Create Own"
  };

  let chosenDesign = designNames[selectedDesign] || "None";

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number: orderNum,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    school: document.getElementById("school").value,
    grade: document.getElementById("grade").value,
    section: document.getElementById("section").value,
    design: chosenDesign,
    links: uploaded.join("\n")
  })
  .then(()=>{
    window.location.href = "thankyou.html";
  })
  .catch(()=>{
    alert("Failed to send");
  });

}
</script>

</body>
</html>
