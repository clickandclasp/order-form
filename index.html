<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Form</title>

  <!-- Fonts -->

  <link href="https://fonts.googleapis.com/css2?family=Averia+Libre:wght@400;700&family=Inter:wght@300;400;500&family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0c2d48;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      border: 2px solid white;
      border-radius: 20px;
      padding: 20px;
      position: relative;
    }

    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 2px solid white;
      opacity: 0.5;
    }
    .top-left { top: 5px; left: 5px; border-right: none; border-bottom: none; }
    .top-right { top: 5px; right: 5px; border-left: none; border-bottom: none; }
    .bottom-left { bottom: 5px; left: 5px; border-right: none; border-top: none; }
    .bottom-right { bottom: 5px; right: 5px; border-left: none; border-top: none; }

    h1 {
      font-family: 'Averia Libre', cursive;
      text-align: center;
      letter-spacing: 3px;
    }

    h2, label {
      font-family: 'Patrick Hand', cursive;
      display: block;
      transform: rotate(-1deg);
    }

    input[type="text"],
    input[type="email"],
    input[type="number"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid white;
      padding: 5px;
      color: white;
      margin-bottom: 15px;
    }

    input:focus {
      outline: none;
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-family: 'Averia Libre';
      font-weight: bold;
      background: white;
      color: #0c2d48;
      cursor: pointer;
    }
  </style>

</head>

<body>

<div class="container">

  <div class="corner top-left"></div>
  <div class="corner top-right"></div>
  <div class="corner bottom-left"></div>
  <div class="corner bottom-right"></div>

  <div class="row">
    <span id="date"></span>
    <span id="order"></span>
  </div>

  <h1>ORDER FORM</h1>

  <h2>Customer Details</h2>
  <label>Name</label>
  <input type="text" id="name">

<label>Email</label> <input type="email" id="email">

  <h2>Order Details</h2>

  <label>
    <input type="radio" name="type" value="50" checked> Plain (₱50)
  </label>

  <label>
    <input type="radio" name="type" value="70"> With Design (₱70)
  </label>

<label>Quantity</label> <input type="number" id="qty" value="1" min="1">

  <h2 id="total">Total: ₱50</h2>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
  document.getElementById("date").textContent =
    "Date: " + new Date().toLocaleDateString();

  const orderNum = Math.floor(10000 + Math.random() * 90000);
  document.getElementById("order").textContent = "Order #: " + orderNum;

  const nameInput = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const radios = document.querySelectorAll('input[name="type"]');
  const qty = document.getElementById("qty");
  const totalText = document.getElementById("total");

  function updateTotal() {
    const price = document.querySelector('input[name="type"]:checked').value;
    totalText.textContent = "Total: ₱" + (price * qty.value);
  }

  radios.forEach(r => r.addEventListener("change", updateTotal));
  qty.addEventListener("input", updateTotal);

  function submitOrder() {
    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const price = document.querySelector('input[name="type"]:checked').value;
    const quantity = qty.value;
    const total = price * quantity;

    if (!name || !email) {
      alert("Please fill out your name and email.");
      return;
    }

    alert(
      "Order submitted! 🎉\n\nOrder #: " + orderNum +
      "\nTotal: ₱" + total
    );

    nameInput.value = "";
    emailInput.value = "";
    qty.value = 1;
    updateTotal();
  }
</script>

</body>
</html>
