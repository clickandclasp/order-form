<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b2f3f;
  --card:#114457;
  --accent:#ffffff;
  --soft:#d9e6ec;
  --muted:rgba(255,255,255,0.6);
  --border:rgba(255,255,255,0.15);
}

body{
  margin:0;
  font-family:'Inter', Arial;
  background:linear-gradient(180deg,#0b2f3f,#0f3b4f);
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:420px;
  margin-top:40px;
  padding-bottom:50px;
}

h1{
  text-align:center;
  font-size:28px;
  font-weight:600;
}

#date,#order{
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

/* INPUT */
input,select,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:white;
}

input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:rgba(255,255,255,0.4);
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  padding:18px;
  margin-top:18px;
  animation:fadeUp .3s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;transform:translateY(0);}
}

/* DESIGN */
.design-row{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.designs img{
  width:60px;
  border-radius:8px;
  cursor:pointer;
  filter:grayscale(70%) brightness(.8);
  transition:.2s;
}

.designs img.selected{
  filter:none;
  transform:scale(1.05);
}

.create-box{
  min-width:80px;
  height:110px;
  border:1px dashed var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:.6;
  cursor:pointer;
}

.create-box.selected{
  opacity:1;
}

/* UPLOAD */
.upload-box{
  border:1px dashed var(--border);
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  cursor:pointer;
}

.preview{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.preview img{
  width:60px;
  border-radius:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:13px;
  margin-top:18px;
  border:none;
  border-radius:12px;
  background:white;
  color:#0f3b4f;
  cursor:pointer;
}

button:disabled{opacity:.5;}

#total{
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div id="date"></div>
<div id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button id="submitBtn" onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let CLOUD_NAME="dacsw26s3";
let UPLOAD_PRESET="keychain_upload";

let orderNum=Math.floor(Math.random()*90000)+10000;
document.getElementById("order").innerText="Order #: "+orderNum;
document.getElementById("date").innerText="Date: "+new Date().toLocaleDateString();

let itemCount=0;

function addItem(){
  itemCount++;

  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
  <h3>Item ${itemCount}</h3>

  <select onchange="toggleSections(this)">
    <option value="plain">Plain (₱25)</option>
    <option value="design">With Design (₱30)</option>
    <option value="custom">Custom (₱35)</option>
  </select>

  <div class="designSection" style="display:none">
    <div class="design-row">
      <div class="designs">
        ${[1,2,3,4,5,6,7].map(n=>`
        <img src="design${n}.png" data-id="${n}" onclick="selectDesign(this)">
        `).join("")}
      </div>

      <div class="create-box" onclick="selectCreateOwn(this)">
        Create Own
      </div>
    </div>
  </div>

  <div class="customSection" style="display:none;">
    <textarea placeholder="Custom Request..."></textarea>

    <div class="upload-box" onclick="openFile(this)">
      Upload Inspo Photos (optional)
      <input type="file" multiple hidden onchange="handleFiles(this,false)">
    </div>

    <div class="preview"></div>
  </div>

  <div class="upload-box mainUpload" onclick="openFile(this)">
    Upload Photos (4 for photo strip)
    <input type="file" multiple hidden onchange="handleFiles(this,true)">
  </div>

  <div class="preview"></div>
  `;

  document.getElementById("items").appendChild(div);
  updateTotal();
}

function openFile(box){
  box.querySelector("input").click();
}

function toggleSections(sel){
  let card=sel.closest(".card");
  card.querySelector(".designSection").style.display="none";
  card.querySelector(".customSection").style.display="none";

  if(sel.value==="design") card.querySelector(".designSection").style.display="block";
  if(sel.value==="custom") card.querySelector(".customSection").style.display="block";

  updateTotal();
  validateSubmit();
}

function selectDesign(img){
  let card=img.closest(".card");
  card.querySelectorAll("img").forEach(i=>i.classList.remove("selected"));
  card.querySelector(".create-box").classList.remove("selected");
  img.classList.add("selected");
}

function selectCreateOwn(box){
  let card=box.closest(".card");
  card.querySelectorAll("img").forEach(i=>i.classList.remove("selected"));
  box.classList.add("selected");
}

let dragged;

function handleFiles(input,isMain){
  let preview=input.parentElement.nextElementSibling;
  let files=[...input.files];
  if(isMain) files=files.slice(0,4);

  preview.innerHTML="";

  files.forEach(file=>{
    let wrap=document.createElement("div");
    let img=document.createElement("img");
    img.src=URL.createObjectURL(file);

    if(isMain){
      img.draggable=true;

      img.ondragstart=()=>dragged=wrap;
      img.ondragover=e=>e.preventDefault();
      img.ondrop=e=>{
        e.preventDefault();
        preview.insertBefore(dragged,wrap);
      };
    }

    img.onclick=()=>{
      let newInput=document.createElement("input");
      newInput.type="file";
      newInput.onchange=e=>{
        let f=e.target.files[0];
        img.src=URL.createObjectURL(f);
        wrap.file=f;
      };
      newInput.click();
    };

    wrap.file=file;
    wrap.appendChild(img);
    preview.appendChild(wrap);
  });

  validateSubmit();
}

function updateTotal(){
  let total=0;
  document.querySelectorAll(".card").forEach(c=>{
    let v=c.querySelector("select").value;
    if(v==="plain") total+=25;
    if(v==="design") total+=30;
    if(v==="custom") total+=35;
  });
  document.getElementById("total").innerText="Total: ₱"+total;
}

function validateSubmit(){
  let valid=true;
  document.querySelectorAll(".card").forEach(card=>{
    let photos=card.querySelector(".mainUpload + .preview");
    if(photos.children.length<4) valid=false;
  });
  document.getElementById("submitBtn").disabled=!valid;
}

async function uploadToCloudinary(file){
  let fd=new FormData();
  fd.append("file",file);
  fd.append("upload_preset",UPLOAD_PRESET);

  let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
    method:"POST",
    body:fd
  });

  let data=await res.json();
  return data.secure_url;
}

async function submitOrder(){

  let btn=document.getElementById("submitBtn");
  btn.disabled=true;
  btn.innerText="Uploading...";

  let designMap={
    1:"Film Strip",
    2:"Gwen Stacey",
    3:"Miles Morales",
    4:"Blue Ocean",
    5:"Red Stripes",
    6:"Pink Pattern",
    7:"Yellow Sun"
  };

  let items=[];
  let photoText="";
  let inspoText="";
  let total=0;

  let cards=document.querySelectorAll(".card");

  for(let i=0;i<cards.length;i++){
    let c=cards[i];

    let type=c.querySelector("select").value;
    let design="None";

    if(type==="plain") total+=25;
    if(type==="design") total+=30;
    if(type==="custom") total+=35;

    if(type==="design"){
      let sel=c.querySelector(".selected");
      if(sel?.classList.contains("create-box")) design="Create Own";
      else if(sel) design=designMap[sel.dataset.id];
    }

    if(type==="custom"){
      design=c.querySelector("textarea").value || "Custom Request";
    }

    items.push(`Item ${i+1}: ${type.toUpperCase()} - ${design}`);

    let main=c.querySelector(".mainUpload + .preview");
    if(main.children.length){
      photoText+=`\nItem ${i+1} Photos:\n`;
      for(let p of main.children){
        let url=await uploadToCloudinary(p.file);
        photoText+=url+"\n";
      }
    }

    let inspo=c.querySelector(".customSection .preview");
    if(inspo && inspo.children.length){
      inspoText+=`\nItem ${i+1} Inspo Photos:\n`;
      for(let p of inspo.children){
        let url=await uploadToCloudinary(p.file);
        inspoText+=url+"\n";
      }
    }
  }

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number:orderNum,
    name:name.value,
    email:email.value,
    school:school.value,
    grade:grade.value,
    section:section.value,
    items:items.join("\n"),
    photos:photoText,
    inspo:inspoText,
    total:"₱"+total
  })
  .then(()=>window.location.href="thankyou.html")
  .catch(()=>{
    alert("Failed");
    btn.disabled=false;
    btn.innerText="Submit Order";
  });
}

addItem();
</script>

</body>
</html>
