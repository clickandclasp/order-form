<h3>Select Design</h3>

<div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">

  <img src="design1.png" class="keychain" onclick="selectDesign(1)">
  <img src="design2.png" class="keychain" onclick="selectDesign(2)">
  <img src="design3.png" class="keychain" onclick="selectDesign(3)">
  <img src="design4.png" class="keychain" onclick="selectDesign(4)">
  <img src="design5.png" class="keychain" onclick="selectDesign(5)">
  <img src="design6.png" class="keychain" onclick="selectDesign(6)">

       onclick="selectDesign('create')"

         cursor:pointer;
         min-width:120px;
         text-align:center;
       ">
    Create Own Design
  </div>

</div>
