<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  width:420px;
  margin-top:30px;
  text-align:center;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

.card {
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:15px;
}

.item {
  margin-top:15px;
  border:1px solid rgba(255,255,255,0.2);
  padding:12px;
  border-radius:10px;
}

/* DESIGN ROW */
.design-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

/* KEYCHAINS */
.designs {
  display:flex;
  gap:10px;
}

.designs img {
  width:55px;
  cursor:pointer;
  border-radius:8px;
  border:2px solid transparent;
  transition:0.2s;
}

.designs img:hover {
  transform:scale(1.1);
}

.designs img.selected {
  border:2px solid yellow;
  transform:scale(1.1);
}

/* CREATE OWN BUTTON */
.create-btn {
  border:2px dashed white;
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
  white-space:nowrap;
  transition:0.2s;
}

.create-btn:hover {
  background:rgba(255,255,255,0.1);
}

.create-btn.active {
  border:2px solid yellow;
}

/* UPLOAD */
.upload-box {
  border:2px dashed white;
  padding:25px;
  margin-top:15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.upload-box:hover {
  background:rgba(255,255,255,0.1);
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

.total {
  margin-top:15px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div id="date"></div>
<div id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<div class="total" id="total">Total: ₱0</div>

<button onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("order").innerText = "Order #: " + orderNum;
document.getElementById("date").innerText =
  "Date: " + new Date().toLocaleDateString();

let itemCount = 0;
let items = [];

function addItem(){
  itemCount++;

  let div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <h3>Item ${itemCount}</h3>

    <select id="type${itemCount}" onchange="toggleDesign(${itemCount}); updateTotal();">
      <option value="25">Plain (₱25)</option>
      <option value="30">With Design (₱30)</option>
    </select>

    <div class="design-row" id="designRow${itemCount}" style="display:none;">
      
      <div class="designs" id="designs${itemCount}">
        ${[1,2,3,4,5,6,7].map(i =>
          `<img src="design${i}.png" onclick="selectDesign(${itemCount},${i})">`
        ).join("")}
      </div>

      <div class="create-btn" id="custom${itemCount}" onclick="selectDesign(${itemCount},'custom')">
        Create Own
      </div>

    </div>

    <div class="upload-box" onclick="document.getElementById('file${itemCount}').click()">
      Upload Photos (4 only)
      <input type="file" id="file${itemCount}" multiple hidden>
    </div>
  `;

  document.getElementById("items").appendChild(div);

  items.push({
    design: "None",
    price:25
  });

  updateTotal();
}

function toggleDesign(i){
  let val = document.getElementById("type"+i).value;
  document.getElementById("designRow"+i).style.display =
    val == "30" ? "flex" : "none";
}

function selectDesign(item, design){

  let imgs = document.querySelectorAll(`#designs${item} img`);
  let customBtn = document.getElementById("custom"+item);

  imgs.forEach(i=>i.classList.remove("selected"));
  customBtn.classList.remove("active");

  if(typeof design === "number"){
    imgs[design-1].classList.add("selected");
  } else {
    customBtn.classList.add("active");
  }

  let names = {
    1:"Film Strip",
    2:"Gwen Stacey",
    3:"Miles Morales",
    4:"Blue Ocean",
    5:"Red Stripes",
    6:"Pink Pattern",
    7:"Yellow Sun",
    "custom":"Create Own"
  };

  items[item-1].design = names[design];
}

function updateTotal(){
  let total = 0;

  for(let i=1;i<=itemCount;i++){
    let val = parseInt(document.getElementById("type"+i).value);
    items[i-1].price = val;
    total += val;
  }

  document.getElementById("total").innerText = "Total: ₱" + total;
}

async function submitOrder(){

  let allLinks = "";

  for(let i=1;i<=itemCount;i++){

    let files = document.getElementById("file"+i).files;
    let links = [];

    for(let file of files){
      let fd = new FormData();
      fd.append("file", file);
      fd.append("upload_preset", "keychain_upload");

      let res = await fetch("https://api.cloudinary.com/v1_1/dacsw26s3/image/upload",{
        method:"POST",
        body:fd
      });

      let data = await res.json();
      links.push(data.secure_url);
    }

    allLinks += `Item ${i} (${items[i-1].design}):\n` + links.join("\n") + "\n\n";
  }

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number: orderNum,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    school: document.getElementById("school").value,
    grade: document.getElementById("grade").value,
    section: document.getElementById("section").value,
    links: allLinks,
    total: document.getElementById("total").innerText
  })
  .then(()=>{
    window.location.href = "thankyou.html";
  })
  .catch(()=>{
    alert("Failed to send");
  });
}

addItem();
</script>

</body>
</html>
