<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f3b4f;
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:420px;
  margin-top:30px;
  text-align:center;
}

/* INPUT FIX */
input, select, textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
  box-sizing:border-box;
}

textarea{
  resize:none;
  height:80px;
}

/* CARD */
.card{
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  padding:15px;
  margin-top:15px;
}

/* SCROLL FIX */
.design-row{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.design-row::-webkit-scrollbar{
  height:6px;
}
.design-row::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.4);
  border-radius:10px;
}

/* DESIGN STYLE */
.designs{
  display:flex;
  gap:10px;
}

.designs img{
  width:55px;
  border-radius:6px;
  cursor:pointer;
  opacity:0.4; /* DIM ALL */
  transition:0.2s;
}

.designs img.selected{
  opacity:1; /* FULL COLOR */
}

.create-box{
  min-width:80px;
  height:110px;
  border:2px dashed white;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:13px;
  text-align:center;
  opacity:0.4;
}

.create-box.selected{
  opacity:1;
}

/* UPLOAD */
.upload-box{
  border:2px dashed white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  cursor:pointer;
}

/* PREVIEW */
.preview{
  display:flex;
  gap:8px;
  margin-top:10px;
  flex-wrap:wrap;
}

.preview img{
  width:60px;
  border-radius:6px;
  cursor:pointer;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:white;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
}
</style>
</head>

<body>

<div class="container">

<h1>ORDER FORM</h1>
<div id="date"></div>
<div id="order"></div>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="school" placeholder="School">
<input id="grade" placeholder="Grade">
<input id="section" placeholder="Section">

<div id="items"></div>

<button onclick="addItem()">+ Add Keychain</button>

<h3 id="total">Total: ₱0</h3>

<button id="submitBtn" onclick="submitOrder()">Submit Order</button>

</div>

<script>
emailjs.init("tp0-EdHc-e3iYbotR");

let CLOUD_NAME = "dacsw26s3";
let UPLOAD_PRESET = "keychain_upload";

let orderNum = Math.floor(Math.random()*90000)+10000;
document.getElementById("order").innerText = "Order #: " + orderNum;
document.getElementById("date").innerText =
"Date: " + new Date().toLocaleDateString();

let itemCount = 0;

function addItem(){
  itemCount++;

  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <h3>Item ${itemCount}</h3>

    <select onchange="toggleSections(this)">
      <option value="plain">Plain (₱25)</option>
      <option value="design">With Design (₱30)</option>
      <option value="custom">Custom (₱35)</option>
    </select>

    <div class="designSection" style="display:none">
      <div class="design-row">
        <div class="designs">
          ${[1,2,3,4,5,6,7].map(n=>`
            <img src="design${n}.png" data-name="${n}" onclick="selectDesign(this)">
          `).join("")}
        </div>

        <div class="create-box" onclick="selectCreateOwn(this)">
          Create Own
        </div>
      </div>
    </div>

    <!-- CUSTOM (FIXED) -->
    <div class="customSection" style="display:none;">
      <textarea placeholder="Custom Request..."></textarea>

      <div class="upload-box" onclick="openFile(this)">
        Upload Inspo Photos (optional)
        <input type="file" multiple hidden onchange="handleFiles(this, false)">
      </div>

      <div class="preview"></div>
    </div>

    <!-- MAIN PHOTO STRIP -->
    <div class="upload-box mainUpload" onclick="openFile(this)">
      Upload Photos (4 for photo strip)
      <input type="file" multiple hidden onchange="handleFiles(this, true)">
    </div>

    <div class="preview"></div>
  `;

  document.getElementById("items").appendChild(div);
  updateTotal();
}

/* FILE */
function openFile(box){
  box.querySelector("input").click();
}

/* TOGGLE */
function toggleSections(sel){
  let card = sel.closest(".card");

  card.querySelector(".designSection").style.display = "none";
  card.querySelector(".customSection").style.display = "none";

  if(sel.value==="design"){
    card.querySelector(".designSection").style.display="block";
  }

  if(sel.value==="custom"){
    card.querySelector(".customSection").style.display="block";
  }

  updateTotal();
  validateSubmit();
}

/* SELECT DESIGN */
function selectDesign(img){
  let card = img.closest(".card");

  card.querySelectorAll("img").forEach(i=>i.classList.remove("selected"));
  card.querySelector(".create-box").classList.remove("selected");

  img.classList.add("selected");
}

/* CREATE OWN */
function selectCreateOwn(box){
  let card = box.closest(".card");

  card.querySelectorAll("img").forEach(i=>i.classList.remove("selected"));
  box.classList.add("selected");
}

/* FILE HANDLER */
function handleFiles(input, isMain){
  let previewBox = input.parentElement.nextElementSibling;
  let files = [...input.files];

  if(isMain) files = files.slice(0,4);

  previewBox.innerHTML="";

  files.forEach(file=>{
    let wrapper = document.createElement("div");

    let img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    img.draggable = true;

    img.onclick = ()=>{
      let newInput = document.createElement("input");
      newInput.type="file";
      newInput.onchange=e=>{
        let newFile = e.target.files[0];
        img.src = URL.createObjectURL(newFile);
        wrapper.file = newFile;
      };
      newInput.click();
    };

    wrapper.file = file;
    wrapper.appendChild(img);
    previewBox.appendChild(wrapper);
  });

  validateSubmit();
}

/* TOTAL */
function updateTotal(){
  let total=0;

  document.querySelectorAll(".card").forEach(card=>{
    let val = card.querySelector("select").value;
    if(val==="plain") total+=25;
    if(val==="design") total+=30;
    if(val==="custom") total+=35;
  });

  document.getElementById("total").innerText="Total: ₱"+total;
}

/* VALIDATE */
function validateSubmit(){
  let valid = true;

  document.querySelectorAll(".card").forEach(card=>{
    let photos = card.querySelector(".mainUpload + .preview");
    if(photos.children.length < 4){
      valid = false;
    }
  });

  document.getElementById("submitBtn").disabled = !valid;
}

/* UPLOAD */
async function uploadToCloudinary(file){
  let formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);

  let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
    method:"POST",
    body:formData
  });

  let data = await res.json();
  return data.secure_url;
}

/* SUBMIT */
async function submitOrder(){

  let items = [];
  let photoLinks = [];

  let designNames = {
    "1":"Film Strip",
    "2":"Gwen Stacey",
    "3":"Miles Morales",
    "4":"Blue Ocean",
    "5":"Red Stripes",
    "6":"Pink Pattern",
    "7":"Yellow Sun"
  };

  for(let card of document.querySelectorAll(".card")){
    let type = card.querySelector("select").value;
    let design = "None";

    if(type==="design"){
      let selected = card.querySelector(".selected");
      if(selected?.classList.contains("create-box")){
        design="Create Own";
      } else if(selected){
        let id = selected.dataset.name;
        design = designNames[id];
      }
    }

    if(type==="custom"){
      design = card.querySelector("textarea").value || "Custom Request";
    }

    items.push({type, design});

    let photos = card.querySelector(".mainUpload + .preview");

    for(let p of photos.children){
      let url = await uploadToCloudinary(p.file);
      photoLinks.push(url);
    }
  }

  let totalText = document.getElementById("total").innerText;

  emailjs.send("service_wuyfomj","template_wlwgyco",{
    order_number: orderNum,
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    school: document.getElementById("school").value,
    grade: document.getElementById("grade").value,
    section: document.getElementById("section").value,
    items: items.map((i,idx)=>`Item ${idx+1}: ${i.type} - ${i.design}`).join("\n"),
    photos: photoLinks.join("\n"),
    total: totalText
  })
  .then(()=>window.location.href="thankyou.html")
  .catch(()=>alert("Failed to send"));
}

addItem();
</script>

</body>
</html>
